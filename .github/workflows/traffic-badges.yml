name: Update Traffic Badges

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic-badges:
    runs-on: ubuntu-latest
    env:
      BADGE_GIST_ID: ${{ secrets.BADGE_GIST_ID }}
      BADGE_GIST_TOKEN: ${{ secrets.BADGE_GIST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap badge gist
        id: bootstrap
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BADGE_GIST_TOKEN }}
          script: |
            const fs = require('fs');
            const configPath = '.github/traffic-badges.json';
            const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));

            if (!process.env.BADGE_GIST_TOKEN) {
              core.setFailed('BADGE_GIST_TOKEN is required. Provide a token with gist scope and repository read access.');
              return;
            }

            const internalFiles = {
              views: '_views_data.json',
              clones: '_clones_data.json'
            };

            const placeholder = (label, color) => JSON.stringify({
              schemaVersion: 1,
              label,
              message: 'pending',
              color
            }, null, 2) + '\n';

            const emptyInternal = () => JSON.stringify({
              count: 0,
              uniques: 0,
              history: {},
              lastUpdated: new Date(0).toISOString()
            }, null, 2) + '\n';

            let gistId = String(process.env.BADGE_GIST_ID || config.gistId || '').trim();
            let gistOwner = String(config.gistOwner || '').trim();

            if (!gistId) {
              const created = await github.request('POST /gists', {
                description: `${context.repo.owner}/${context.repo.repo} traffic badge data`,
                public: false,
                files: {
                  [config.files.views]: { content: placeholder('views', config.colors.views) },
                  [config.files.clones]: { content: placeholder('clones', config.colors.clones) },
                  [internalFiles.views]: { content: emptyInternal() },
                  [internalFiles.clones]: { content: emptyInternal() }
                }
              });

              gistId = created.data.id;
              gistOwner = created.data.owner?.login || context.repo.owner;
            } else {
              const existing = await github.request('GET /gists/{gist_id}', {
                gist_id: gistId
              });
              gistOwner = existing.data.owner?.login || gistOwner || context.repo.owner;
            }

            if (config.gistId !== gistId || config.gistOwner !== gistOwner) {
              config.gistId = gistId;
              config.gistOwner = gistOwner;
              fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
            }

            core.setOutput('gist_id', gistId);
            core.setOutput('gist_owner', gistOwner);

      - name: Update gist-backed traffic badges
        uses: actions/github-script@v7
        env:
          GIST_ID: ${{ steps.bootstrap.outputs.gist_id }}
        with:
          github-token: ${{ secrets.BADGE_GIST_TOKEN }}
          script: |
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('.github/traffic-badges.json', 'utf8'));
            const gistId = process.env.GIST_ID;
            const internalFiles = {
              views: '_views_data.json',
              clones: '_clones_data.json'
            };

            const numberFormat = new Intl.NumberFormat('en-US');
            const gist = await github.request('GET /gists/{gist_id}', { gist_id: gistId });

            function parseJsonFile(name) {
              const raw = gist.data.files?.[name]?.content;
              if (!raw) {
                return null;
              }
              try {
                return JSON.parse(raw);
              } catch {
                return null;
              }
            }

            function emptyInternalData() {
              return {
                count: 0,
                uniques: 0,
                history: {},
                lastUpdated: new Date(0).toISOString()
              };
            }

            function normalizeInternalData(payload) {
              if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
                return null;
              }

              if (payload.internal) {
                return normalizeInternalData(payload.internal);
              }

              const hasInternalShape =
                'count' in payload ||
                'uniques' in payload ||
                'history' in payload ||
                'lastUpdated' in payload;

              if (!hasInternalShape) {
                return null;
              }

              const historyEntries =
                payload.history && typeof payload.history === 'object' && !Array.isArray(payload.history)
                  ? Object.entries(payload.history)
                  : [];

              const history = Object.fromEntries(
                historyEntries.map(([key, value]) => {
                  const entry = value && typeof value === 'object' ? value : {};
                  return [key, {
                    count: Number(entry.count || 0),
                    uniques: Number(entry.uniques || 0),
                    timestamp: typeof entry.timestamp === 'string' ? entry.timestamp : `${key}T00:00:00Z`
                  }];
                })
              );

              return {
                count: Number(payload.count || 0),
                uniques: Number(payload.uniques || 0),
                history,
                lastUpdated: typeof payload.lastUpdated === 'string' ? payload.lastUpdated : new Date(0).toISOString()
              };
            }

            function parseInternalData(primaryName, fallbackName) {
              return (
                normalizeInternalData(parseJsonFile(primaryName)) ||
                normalizeInternalData(parseJsonFile(fallbackName)) ||
                emptyInternalData()
              );
            }

            function mergeSeries(label, color, previous, items) {
              const history = { ...(previous.history || {}) };
              for (const item of items) {
                const key = String(item.timestamp).slice(0, 10);
                history[key] = {
                  count: Number(item.count || 0),
                  uniques: Number(item.uniques || 0),
                  timestamp: item.timestamp
                };
              }

              const orderedEntries = Object.entries(history).sort(([left], [right]) => left.localeCompare(right));
              const normalizedHistory = Object.fromEntries(orderedEntries);
              const count = orderedEntries.reduce((sum, [, value]) => sum + Number(value.count || 0), 0);
              const uniques = orderedEntries.reduce((sum, [, value]) => sum + Number(value.uniques || 0), 0);

              // shields.io /endpoint only accepts: schemaVersion, label, message, color
              const badge = {
                schemaVersion: 1,
                label,
                message: `${numberFormat.format(count)} total`,
                color
              };

              // Internal data for history accumulation (stored in separate gist file)
              const internal = { count, uniques, history: normalizedHistory, lastUpdated: new Date().toISOString() };

              return { badge, internal };
            }

            const viewsResponse = await github.request('GET /repos/{owner}/{repo}/traffic/views', {
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const clonesResponse = await github.request('GET /repos/{owner}/{repo}/traffic/clones', {
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const viewsPayload = mergeSeries(
              'views',
              config.colors.views,
              parseInternalData(internalFiles.views, config.files.views),
              viewsResponse.data.views || []
            );

            const clonesPayload = mergeSeries(
              'clones',
              config.colors.clones,
              parseInternalData(internalFiles.clones, config.files.clones),
              clonesResponse.data.clones || []
            );

            await github.request('PATCH /gists/{gist_id}', {
              gist_id: gistId,
              files: {
                [config.files.views]: { content: `${JSON.stringify(viewsPayload.badge, null, 2)}\n` },
                [config.files.clones]: { content: `${JSON.stringify(clonesPayload.badge, null, 2)}\n` },
                [internalFiles.views]: { content: `${JSON.stringify(viewsPayload.internal, null, 2)}\n` },
                [internalFiles.clones]: { content: `${JSON.stringify(clonesPayload.internal, null, 2)}\n` }
              }
            });

      - name: Sync README badge URLs
        env:
          GIST_ID: ${{ steps.bootstrap.outputs.gist_id }}
          GIST_OWNER: ${{ steps.bootstrap.outputs.gist_owner }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const config = JSON.parse(fs.readFileSync('.github/traffic-badges.json', 'utf8'));
          const gistId = process.env.GIST_ID || config.gistId;
          const gistOwner = process.env.GIST_OWNER || config.gistOwner || config.repoOwner;

          if (!gistId || !gistOwner) {
            throw new Error('Missing gist metadata for README badge sync.');
          }

          const badgeUrl = (file) =>
            `https://img.shields.io/endpoint?style=for-the-badge&logo=github&url=${encodeURIComponent(`https://gist.githubusercontent.com/${gistOwner}/${gistId}/raw/${file}`)}`;

          const replacement = [
            '  <!-- traffic-badges:start -->',
            `  [![Views](${badgeUrl(config.files.views)})](https://github.com/${config.repoOwner}/${config.repoName})`,
            `  [![Clones](${badgeUrl(config.files.clones)})](https://github.com/${config.repoOwner}/${config.repoName})`,
            '  <!-- traffic-badges:end -->'
          ].join('\n');

          const readmePath = 'README.md';
          const current = fs.readFileSync(readmePath, 'utf8');
          const next = current.replace(
            /  <!-- traffic-badges:start -->[\s\S]*?  <!-- traffic-badges:end -->/,
            replacement
          );

          if (next !== current) {
            fs.writeFileSync(readmePath, next);
          }
          NODE

      - name: Persist bootstrap metadata
        run: |
          if git diff --quiet -- README.md .github/traffic-badges.json; then
            exit 0
          fi

          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md .github/traffic-badges.json
          git commit -m "chore: bootstrap traffic badges [skip ci]"
          git push
